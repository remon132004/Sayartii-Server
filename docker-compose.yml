version: '3.8'

services:
  sayartii-db:
    image: postgres:latest
    container_name: sayartii-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=sa
      - POSTGRES_PASSWORD=SayartiiSecurePassword123!
      - POSTGRES_DB=SayartiiDb
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  sayartii-backend:
    build: ./backend
    container_name: sayartii-backend
    restart: always
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_HTTP_PORTS=80
      - ConnectionStrings__DefaultConnection=Host=sayartii-db;Database=SayartiiDb;Username=sa;Password=SayartiiSecurePassword123!
    depends_on:
      - sayartii-db
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  sayartii-ai:
    build: ./flask_backend
    container_name: sayartii-ai
    restart: always
    ports:
      - "5050:5000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./flask_backend/saved_models:/app/saved_models
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
